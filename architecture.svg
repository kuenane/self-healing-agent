<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="800" height="620" fill="#0f0f13" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e0f9">Self-Healing Agent — 6-Phase Loop</text>

  <!-- ─── Phase boxes ─── -->

  <!-- Phase 1: Trace -->
  <rect x="48" y="72" width="160" height="72" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="1"/>
  <text x="128" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#CECBF6">Phase 1</text>
  <text x="128" y="122" text-anchor="middle" font-size="12" fill="#AFA9EC">Trace</text>

  <!-- Phase 2: Retrieve Memory -->
  <rect x="320" y="72" width="160" height="72" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="1"/>
  <text x="400" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#CECBF6">Phase 2</text>
  <text x="400" y="122" text-anchor="middle" font-size="12" fill="#AFA9EC">Retrieve memory</text>

  <!-- Phase 3: Execute -->
  <rect x="592" y="72" width="160" height="72" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="1"/>
  <text x="672" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#CECBF6">Phase 3</text>
  <text x="672" y="122" text-anchor="middle" font-size="12" fill="#AFA9EC">Execute w/ memory</text>

  <!-- Phase 4: Evaluate Metrics -->
  <rect x="592" y="260" width="160" height="72" rx="8" fill="#04342C" stroke="#0F6E56" stroke-width="1"/>
  <text x="672" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB">Phase 4</text>
  <text x="672" y="310" text-anchor="middle" font-size="12" fill="#5DCAA5">Evaluate metrics</text>

  <!-- Phase 5: Detect Patterns -->
  <rect x="320" y="260" width="160" height="72" rx="8" fill="#04342C" stroke="#0F6E56" stroke-width="1"/>
  <text x="400" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB">Phase 5</text>
  <text x="400" y="310" text-anchor="middle" font-size="12" fill="#5DCAA5">Detect patterns</text>

  <!-- Phase 6: Improve & Re-execute -->
  <rect x="320" y="420" width="160" height="72" rx="8" fill="#4A1B0C" stroke="#993C1D" stroke-width="1"/>
  <text x="400" y="450" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C4B3">Phase 6</text>
  <text x="400" y="470" text-anchor="middle" font-size="12" fill="#F0997B">Improve &amp; re-execute</text>

  <!-- ─── Arrows ─── -->

  <!-- P1 → P2 -->
  <line x1="208" y1="108" x2="318" y2="108" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- P2 → P3 -->
  <line x1="480" y1="108" x2="590" y2="108" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- P3 → P4 (down) -->
  <line x1="672" y1="144" x2="672" y2="258" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- P4 → P5 (left) -->
  <line x1="590" y1="296" x2="482" y2="296" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- P5 → P6 (down) -->
  <line x1="400" y1="332" x2="400" y2="418" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr-coral)"/>

  <!-- P6 → P1 feedback loop (L-bend left + up) -->
  <path d="M320 456 L96 456 L96 144" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr-purple)"/>

  <!-- Loop label -->
  <text x="56" y="452" font-size="11" fill="#7F77DD">↻ loop</text>

  <!-- ─── Tech stack ─── -->

  <!-- Arize Phoenix -->
  <rect x="48" y="536" width="200" height="60" rx="8" fill="#1a1a24" stroke="#3d3d55" stroke-width="1"/>
  <text x="148" y="561" text-anchor="middle" font-size="12" font-weight="600" fill="#CECBF6">Arize Phoenix</text>
  <text x="148" y="579" text-anchor="middle" font-size="11" fill="#888780">Observability MCP</text>

  <!-- Redis -->
  <rect x="300" y="536" width="200" height="60" rx="8" fill="#1a1a24" stroke="#3d3d55" stroke-width="1"/>
  <text x="400" y="561" text-anchor="middle" font-size="12" font-weight="600" fill="#CECBF6">Redis</text>
  <text x="400" y="579" text-anchor="middle" font-size="11" fill="#888780">Patterns &amp; history</text>

  <!-- Gemini 2.5 Flash -->
  <rect x="552" y="536" width="200" height="60" rx="8" fill="#1a1a24" stroke="#3d3d55" stroke-width="1"/>
  <text x="652" y="561" text-anchor="middle" font-size="12" font-weight="600" fill="#CECBF6">Gemini 2.5 Flash</text>
  <text x="652" y="579" text-anchor="middle" font-size="11" fill="#888780">LLM backbone</text>

  <!-- Divider -->
  <line x1="48" y1="522" x2="752" y2="522" stroke="#2a2a3a" stroke-width="1"/>

  <!-- ─── Arrow markers ─── -->
  <defs>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
